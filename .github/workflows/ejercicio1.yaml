name: ejercicio1

on:
  pull_request:
    branches: [ main ]
    paths: [ 'hangman-front/**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hangman-front
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node version
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: hangman-front/package-lock.json

      - name: Build solution
        working-directory: ./hangman-front
        run: |
          npm ci
          npm run build --if-present


  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node version
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Test
        working-directory: ./hangman-front
        run: |
          npm ci        
          npm run test