name: ci

on:
  push:
    branches: [ main ]
#    paths: [ 'hangman-api/**' ]
  pull_request:
    branches: [ main ]
#    paths: [ 'hangman-api/**' ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
        matrix:
          node-version: [16, 18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node Version
        uses: actions/setup-node@6
        with:
          node-version: ${{matrix.node-version}}

      - name: Build and test
        working-directory: ./hangman-api
        run: |
          npm ci
          npm run build --if-present
          npm test