name: ci

on:
  push:
    branches: [ main ]
#    paths: [ 'hangman-api/**' ]
  pull_request:
    branches: [ main ]
#    paths: [ 'hangman-api/**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node Version
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Build
        working-directory: ./hangman-api
        run: |
          npm ci
          npm run build --if-present

  test:
    runs-on: ubuntu-latest
    needs: build ###depends on build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node Version
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Test
        working-directory: ./hangman-api
        run: |
          npm ci
          npm run test

  last:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: bye
        run: echo "Bye!"