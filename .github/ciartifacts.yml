name: ci artifacts

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node Version
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: hangman-api/package-lock.json 
      - name: Build
        working-directory: ./hangman-api
        run: |
          npm ci
          npm run build --if-present

  test:
    runs-on: ubuntu-latest
    needs: build ###depends on build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node Version
        uses: actions/setup-node@v6
        with:
          node-version: 20     
      - name: Test
        working-directory: ./hangman-api
        run: |
          npm ci
          npm run test