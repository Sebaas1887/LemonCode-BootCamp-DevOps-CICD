name: ci

on:
  workflow_dispatch:
#   push:
#     branches: [ main ]
#    paths: [ 'hangman-api/**' ]
#   pull_request:
#     branches: [ main ]
# #    paths: [ 'hangman-api/**' ]
    

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node Version
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Build
        working-directory: ./hangman-api
        run: |
          npm ci
          npm run build --if-present
      - name: Upload node mofules as artifact
        uses: actions/upload-artifact@v6
        with:
            name: dependencies
            path: hangman-api/node_modules
            include-hidden-files: true


  test:
    runs-on: ubuntu-latest
    needs: build ###depends on build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node Version
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Download node modules
        uses: actions/download-artifacts@v7
        with:
            name: dependencies
            path: hangman-api/node_modules       

      - name: Test
        working-directory: ./hangman-api
        run: |
          chmod -R +x node_modules
          npm run test

